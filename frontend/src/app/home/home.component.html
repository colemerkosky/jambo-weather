@let user = currentUser$ | async;

<div class="home-container">
  <nav class="navbar">
    <div class="navbar-content">
      <h1>Weather Forecast</h1>
      <div class="user-section">
        @if(user){
          <span class="username">{{ user }}</span>
        }
        <button class="btn btn-logout" (click)="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <h2>Weather Forecast + City Data</h2>

    <app-city-dropdown
      [cities]="cities()"
      [(selectedCityId)]="selectedCityId"
      [geolocationCityName]="geolocationCityName()"
      (citySelected)="onCitySelected($event)">
    </app-city-dropdown>

    <div class="card">
      <app-city-data [selectedCityId]="selectedCityId()" (geolocationCityName)="setGeolocationCityName($event)"></app-city-data>
    </div>
    

  </main>
</div>
