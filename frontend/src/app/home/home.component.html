@let user = currentUser$ | async;

<div class="home-container">
  <nav class="navbar">
    <div class="navbar-content">
      <h1>Weather Forecast</h1>
      <div class="user-section">
        @if(user){
          <span class="username">{{ user }}</span>
        }
        <button class="btn btn-logout" (click)="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <h2>Weather Forecast + City Data</h2>
    @if(loading()){
      <div class="status-message">Loading city data...</div>
    }
    @else if(!loading() && error()) {
      <div class="status-message status-error">City data could not be loaded</div>
    }
    @else if(cityData(); as cityData){
      <app-city-data [cityData]="cityData"></app-city-data>
    }
  </main>
</div>
